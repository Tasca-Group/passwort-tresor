<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F0F1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tresor">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Passwort-Tresor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Lock Screen -->
  <div id="lockScreen" class="screen active">
    <div class="lock-container">
      <div class="lock-icon">🔐</div>
      <h1 class="lock-title">Passwort-<span class="gradient-text">Tresor</span></h1>
      <p class="lock-subtitle">Deine Zugänge. Sicher verschlüsselt.</p>
      <form id="loginForm" class="lock-form">
        <div class="input-group">
          <input type="password" id="masterPassword" placeholder="Master-Passwort" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Entsperren</button>
        <p id="loginError" class="error-text hidden">Falsches Passwort</p>
      </form>
      <p id="setupHint" class="setup-hint hidden">Erstes Mal? Wähle ein Master-Passwort.</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="screen">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <h1 class="header-title">Tresor</h1>
      </div>
      <div class="header-right">
        <button id="addBtn" class="btn-icon" title="Neuer Eintrag">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="lockBtn" class="btn-icon" title="Sperren">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Suchen...">
    </div>

    <!-- Category Filter -->
    <div class="category-filter" id="categoryFilter">
      <button class="cat-btn active" data-cat="all">Alle</button>
    </div>

    <!-- Entry List -->
    <div id="entryList" class="entry-list"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">🔑</div>
      <p>Noch keine Einträge</p>
      <button class="btn-secondary" id="emptyAddBtn">Ersten Eintrag anlegen</button>
    </div>
  </div>

  <!-- Entry Detail Modal -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="detailTitle">Eintrag</h2>
        <button class="btn-icon modal-close" id="detailClose">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="detailBody" class="modal-body"></div>
      <div class="modal-actions">
        <button class="btn-danger" id="detailDelete">Löschen</button>
        <button class="btn-secondary" id="detailEdit">Bearbeiten</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="editModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="editTitle">Neuer Eintrag</h2>
        <button class="btn-icon modal-close" id="editClose">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="editForm" class="modal-body">
        <div class="input-group">
          <label>Name *</label>
          <input type="text" id="editName" required placeholder="z.B. Instagram Business">
        </div>
        <div class="input-group">
          <label>Kategorie</label>
          <div class="category-select">
            <select id="editCategory">
              <option value="Social Media">Social Media</option>
              <option value="Hosting">Hosting</option>
              <option value="Tools">Tools</option>
              <option value="E-Mail">E-Mail</option>
              <option value="Banking">Banking</option>
              <option value="Kunden">Kunden</option>
              <option value="Server">Server</option>
              <option value="Sonstiges">Sonstiges</option>
            </select>
            <input type="text" id="editCategoryCustom" placeholder="Oder eigene Kategorie..." class="custom-cat-input">
          </div>
        </div>
        <div class="input-group">
          <label>URL / Webseite</label>
          <input type="text" id="editUrl" placeholder="https://...">
        </div>
        <div class="input-group">
          <label>Benutzername / E-Mail</label>
          <input type="text" id="editUsername" placeholder="user@example.com">
        </div>
        <div class="input-group">
          <label>Passwort</label>
          <div class="password-input-wrap">
            <input type="password" id="editPassword" placeholder="••••••••">
            <button type="button" class="btn-toggle-pw" id="editTogglePw">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="input-group">
          <label>Notizen</label>
          <textarea id="editNotes" placeholder="Zusätzliche Infos..." rows="3"></textarea>
        </div>
        <div id="customFieldsContainer"></div>
        <button type="button" class="btn-add-field" id="addFieldBtn">+ Weiteres Feld</button>
        <input type="hidden" id="editId">
        <button type="submit" class="btn-primary">Speichern</button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="crypto.js"></script>
  <script src="app.js"></script>
</body>
</html>
